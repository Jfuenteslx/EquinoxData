{% extends 'base.html' %}
{% block content %}

<div class="content-header">
    <div class="container-fluid">
        <h1 class="m-0 text-dark">Eliminar Producto</h1>
    </div>
</div>

<section class="content">
    <div class="container-fluid">
        <div class="col-md-6">
            <div class="card card-danger">
                <div class="card-header">
                    <h3 class="card-title">Confirmar eliminacion</h3>
                </div>
                <div class="card-body">
                    <p>Esta seguro que desea eliminar el producto <strong>{{ object.nombre }}</strong>?</p>
                    <p class="text-muted">Esta accion no se puede deshacer.</p>
                    <form method="post">
                        {% csrf_token %}
                        <a href="{% url 'productos:producto-menu-list' %}" class="btn btn-secondary mr-2">
                            <i class="fas fa-arrow-left mr-1"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash mr-1"></i> Eliminar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
