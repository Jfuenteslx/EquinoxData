{% extends 'base.html' %}
{% block content %}

<div class="content-header">
    <div class="container-fluid">
        <h1 class="m-0 text-dark">Ajustar Inventario</h1>
    </div>
</div>

<section class="content">
    <div class="container-fluid">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">{{ producto.nombre }}</h3>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle mr-1"></i>
                        Stock actual: <strong>{{ inventario.botellas }} botellas</strong> y <strong>{{ inventario.medidas_sueltas }} medidas sueltas</strong>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Botellas</label>
                                {{ form.botellas }}
                            </div>
                            <div class="form-group col-md-6">
                                <label>Medidas sueltas</label>
                                {{ form.medidas_sueltas }}
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-3">
                            <a href="{% url 'inventarios:inventario_list' %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left mr-1"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="fas fa-save mr-1"></i> Guardar ajuste
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
